<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#25D366;--gd:#128C7E;--bg:#111B21;--sb:#202C33;--pb:#0D1418;
  --hb:#202C33;--bm:#005C4B;--bt:#202C33;--t1:#E9EDEF;--t2:#8696A0;
  --t3:#667781;--br:#2A3942;--ho:#2A3942;--f:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--f);font-size:15px;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* SIDEBAR */
.sidebar{width:360px;min-width:360px;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--br)}
.s-head{padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--hb);border-bottom:1px solid var(--br)}
.logo-icon{font-size:24px}
.logo-name{font-size:17px;font-weight:700;color:var(--g)}
.logo-sub{font-size:11px;color:var(--t3)}
.s-search{display:flex;align-items:center;gap:8px;margin:8px 12px;background:var(--pb);border-radius:8px;padding:8px 12px}
.s-search input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:var(--f);font-size:14px}
.s-search input::placeholder{color:var(--t3)}
.s-list{flex:1;overflow-y:auto}
.s-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(42,57,66,.4);transition:background .15s}
.s-item:hover{background:var(--ho)}
.s-item.active{background:var(--ho)}
.av{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0}
.av-f{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.s-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-date{font-size:11px;color:var(--t3);flex-shrink:0;margin-left:8px}
.s-prev{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--pb)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--t3)}
.empty-icon{font-size:64px;opacity:.3}
.empty h2{font-size:20px;font-weight:500;color:var(--t2)}
.empty p{font-size:14px}

/* CHAT */
.c-head{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--hb);border-bottom:1px solid var(--br);flex-shrink:0}
.c-name{font-size:16px;font-weight:600}
.c-role{font-size:12px;color:var(--t2)}
.c-msgs{flex:1;overflow-y:auto;padding:16px 60px;display:flex;flex-direction:column;gap:4px}
.date-sep{text-align:center;margin:10px 0}
.date-sep span{background:var(--sb);padding:4px 12px;border-radius:8px;font-size:12px;color:var(--t2)}
.bubble{max-width:65%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.5;word-break:break-word}
.b-them{background:var(--bt);align-self:flex-start;border-bottom-left-radius:2px}
.b-me{background:var(--bm);align-self:flex-end;border-bottom-right-radius:2px}
.b-time{font-size:11px;color:var(--t3);text-align:right;margin-top:2px}
.b-link{color:#53BDEB}

@media(max-width:700px){
  .sidebar{width:100%;min-width:100%;position:absolute;z-index:10;height:100%}
  .sidebar.hidden{display:none}
  .c-msgs{padding:16px 12px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="s-head">
      <span class="logo-icon">💬</span>
      <div>
        <div class="logo-name">JhatsApp</div>
        <div class="logo-sub">by Jmail</div>
      </div>
    </div>
    <div class="s-search">
      <span style="opacity:.5">🔍</span>
      <input id="search" type="text" placeholder="Search conversations…" oninput="renderList()"/>
    </div>
    <div class="s-list" id="list"></div>
  </aside>
  <main class="main" id="main">
    <div class="empty" id="empty">
      <div class="empty-icon">💬</div>
      <h2>JhatsApp</h2>
      <p>Select a conversation to start reading</p>
    </div>
    <div id="chat" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden"></div>
  </main>
</div>

let activeId=null;

function avHtml(c,size=46){
  const s=`width:${size}px;height:${size}px`;
  if(c.avatar) return `<img class="av" src="${c.avatar}" style="${s}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="${c.name}"/><div class="av-f" style="${s};background:${color(c.name)};display:none">${initials(c.name)}</div>`;
  return `<div class="av-f" style="${s};background:${color(c.name)}">${initials(c.name)}</div>`;
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=contacts.filter(c=>c.name.toLowerCase().includes(q));
  document.getElementById('list').innerHTML=filtered.map(c=>{
    const cv=convos[c.id];
    if(!cv)return'';
    return`<div class="s-item${activeId===c.id?' active':''}" onclick="openChat('${c.id}')">
      <div style="display:flex;flex-shrink:0">${avHtml(c)}</div>
      <div class="s-info">
        <div class="s-row"><span class="s-name">${c.name}</span><span class="s-date">${cv.last}</span></div>
        <div class="s-prev">${cv.preview}</div>
      </div>
    </div>`;
  }).join('');
}

function openChat(id){
  activeId=id;
  renderList();
  const c=contacts.find(x=>x.id===id);
  const cv=convos[id];
  document.getElementById('empty').style.display='none';
  const chat=document.getElementById('chat');
  chat.style.display='flex';
  chat.style.flexDirection='column';
  chat.style.overflow='hidden';
  chat.style.flex='1';

  let lastDate='';
  const msgs=cv.msgs.map(m=>{
    let sep='';
    if(m.date!==lastDate){lastDate=m.date;sep=`<div class="date-sep"><span>${m.date}</span></div>`;}
    return`${sep}<div class="bubble ${m.from==='me'?'b-me':'b-them'}">${m.text}<div class="b-time">${m.time}${m.from==='me'?' ✓✓':''}</div></div>`;
  }).join('');

  chat.innerHTML=`
    <div class="c-head">
      <div style="display:flex;flex-shrink:0">${avHtml(c,40)}</div>
      <div><div class="c-name">${c.name}</div><div class="c-role">${c.role}</div></div>
    </div>
    <div class="c-msgs" id="msgs">${msgs}</div>`;
  const el=document.getElementById('msgs');
  el.scrollTop=el.scrollHeight;

  if(window.innerWidth<=700){
    document.getElementById('sidebar').classList.add('hidden');
  }
}

renderList();
